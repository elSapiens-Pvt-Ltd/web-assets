<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:#0c1018;display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',system-ui,sans-serif;color:#fff}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(212,175,55,.015) 2px,rgba(212,175,55,.015) 4px);pointer-events:none}
.card{position:relative;background:#0f1623;border:1px solid rgba(212,175,55,.18);border-radius:18px;padding:52px 44px;width:430px;max-width:96vw;text-align:center;box-shadow:0 40px 100px rgba(0,0,0,.7)}
.ico{width:68px;height:68px;background:rgba(212,175,55,.07);border:1px solid rgba(212,175,55,.22);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 22px;font-size:30px}
h1{font-size:20px;font-weight:700;margin-bottom:5px}
p{font-size:13px;color:rgba(255,255,255,.45);line-height:1.55;margin-bottom:30px}
.pins{display:flex;gap:9px;justify-content:center;margin-bottom:22px}
.pin{width:50px;height:58px;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.11);border-radius:9px;font-size:24px;font-weight:700;text-align:center;color:#d4af37;caret-color:#d4af37;outline:none;transition:border-color .18s,background .18s}
.pin:focus{border-color:rgba(212,175,55,.55);background:rgba(212,175,55,.04)}
.pin.ok{border-color:rgba(212,175,55,.35)}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#d4af37,#b8941e);border:none;border-radius:9px;color:#0c1018;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .18s,transform .1s}
.btn:hover{opacity:.88}.btn:active{transform:scale(.98)}.btn:disabled{opacity:.4;cursor:not-allowed}
.err{color:#ff6b6b;font-size:13px;margin-top:11px;min-height:20px}
.brand{margin-top:24px;font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.14)}
.ok-ov{position:fixed;inset:0;background:#0c1018;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;opacity:0;pointer-events:none;transition:opacity .35s}
.ok-ov.show{opacity:1;pointer-events:all}
.ok-ring{width:76px;height:76px;background:rgba(212,175,55,.08);border:1px solid rgba(212,175,55,.3);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:34px;margin-bottom:18px}
.ok-txt{font-size:17px;font-weight:600;color:#d4af37}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-9px)}40%{transform:translateX(9px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.shake{animation:shake .4s ease}
</style>
</head>

var boxes=[].slice.call(document.querySelectorAll('.pin'));
boxes.forEach(function(b,i){
  b.addEventListener('input',function(e){
    var v=e.target.value.replace(/[^0-9]/g,'');
    e.target.value=v.slice(-1);
    if(v){b.classList.add('ok');if(i<5)boxes[i+1].focus();else go();}
  });
  b.addEventListener('keydown',function(e){if(e.key==='Backspace'&&!b.value&&i>0)boxes[i-1].focus();});
  b.addEventListener('paste',function(e){
    e.preventDefault();
    var t=(e.clipboardData||window.clipboardData).getData('text').replace(/[^0-9]/g,'').slice(0,6);
    t.split('').forEach(function(ch,j){if(boxes[i+j])boxes[i+j].value=ch;});
    boxes[Math.min(i+t.length,5)].focus();
    if(t.length>=6)go();
  });
});
boxes[0].focus();
function b64(s){var bin=atob(s),u=new Uint8Array(bin.length);for(var j=0;j<bin.length;j++)u[j]=bin.charCodeAt(j);return u;}
async function go(){
  var pin=boxes.map(function(b){return b.value;}).join('');
  if(pin.length<6){document.getElementById('err').textContent='Enter all 6 digits.';return;}
  var btn=document.getElementById('btn');
  btn.disabled=true;btn.textContent='Unlocking…';
  document.getElementById('err').textContent='';
  try{
    var enc=new TextEncoder();
    var km=await crypto.subtle.importKey('raw',enc.encode(pin),'PBKDF2',false,['deriveKey']);
    var k=await crypto.subtle.deriveKey(
      {name:'PBKDF2',salt:b64(S),iterations:100000,hash:'SHA-256'},
      km,{name:'AES-GCM',length:256},false,['decrypt']);
    var dec=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(I)},k,b64(B));
    var html=new TextDecoder().decode(dec);
    document.getElementById('ok').classList.add('show');
    setTimeout(function(){document.open();document.write(html);document.close();},700);
  }catch(e){
    var p=document.getElementById('pins');
    p.classList.add('shake');
    p.addEventListener('animationend',function(){p.classList.remove('shake');},{once:true});
    document.getElementById('err').textContent='Incorrect PIN. Please try again.';
    boxes.forEach(function(b){b.value='';b.classList.remove('ok');});
    boxes[0].focus();
    btn.disabled=false;btn.textContent='Unlock Document';
  }
}
</script>
